<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="0.27" cy="0.32" r="0.6">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Fox mark, scaled from 32-viewBox to about 60px -->
  <g transform="translate(90 75) scale(1.875)">
    <path d="M4.5 4.5 L11.5 9.5 L20.5 9.5 L27.5 4.5 L27 15 L22.5 22.5 L16 27.5 L9.5 22.5 L5 15 Z" fill="#f5f5f5"/>
    <path d="M7 7 L11 10 L9 12 Z" fill="#0a0a0a" opacity="0.55"/>
    <path d="M25 7 L21 10 L23 12 Z" fill="#0a0a0a" opacity="0.55"/>
    <path d="M9.4 13 L12.4 15" stroke="#0a0a0a" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M22.6 13 L19.6 15" stroke="#0a0a0a" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M13.5 18 L16 22.5 L18.5 18 Z" fill="#0a0a0a"/>
    <circle cx="16" cy="18.4" r="1.05" fill="#4ade80"/>
  </g>

  <text x="165" y="118" fill="#f5f5f5"
        font-family="-apple-system, 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif"
        font-size="28" font-weight="700">Demand Atlas</text>

  <circle cx="92" cy="176" r="5" fill="#4ade80"/>
  <text x="108" y="182" fill="#c2c2c2"
        font-family="Consolas, 'SF Mono', monospace"
        font-size="14" font-weight="500">LIVE — 世の中の兆候を追跡中</text>

  <text x="80" y="310" fill="#f5f5f5"
        font-family="-apple-system, 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif"
        font-size="80" font-weight="600" letter-spacing="-3">今、世の中で</text>
  <text x="80" y="410" fill="url(#titleGrad)"
        font-family="-apple-system, 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif"
        font-size="80" font-weight="600" letter-spacing="-3">何が求められているのか。</text>

  <text x="80" y="475" fill="#c2c2c2"
        font-family="-apple-system, 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif"
        font-size="24">需要の変化から、次のビジネスチャンスを発見する。</text>

  <!-- Chart line accent -->
  <path d="M 80 560 C 250 555, 400 530, 550 510 S 850 450, 1000 400 S 1120 375, 1150 370"
        stroke="#4ade80" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="1150" cy="370" r="10" fill="#4ade80" opacity="0.25"/>
  <circle cx="1150" cy="370" r="5" fill="#4ade80"/>
</svg>
