<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Demand Atlas — 世の中の需要を可視化する</title>
    <meta name="description" content="今、世の中で何が求められているのか。SNS・検索・悩み・求人などの参考データから需要の変化を可視化し、次のビジネスチャンスを発見するためのサービスです。" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Demand Atlas" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Demand Atlas — 世の中の需要を可視化する" />
    <meta property="og:description" content="今、世の中で何が求められているのか。需要の変化から、次のビジネスチャンスを発見する。" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Demand Atlas — 世の中で今、何が求められているのかを発見する需要可視化サービス" />
    <meta property="og:url" content="/" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Demand Atlas — 世の中の需要を可視化する" />
    <meta name="twitter:description" content="今、世の中で何が求められているのか。需要の変化から、次のビジネスチャンスを発見する。" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Demand Atlas — 需要の可視化と発見" />

    <!-- Apply the saved theme before React mounts, to prevent a flash of the wrong palette -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('demand-atlas:theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
